services:
  # Backend API Service
  - type: web
    name: incident-management-api
    runtime: node
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

databases:
  # MongoDB Database
  - name: incident-management-db
    databaseName: incident_management
    user: admin
    region: oregon
    plan: free
